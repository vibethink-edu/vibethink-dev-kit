name: agent-context

# Makes the cross-agent layering norms BITE (review finding backlog: "Add CI that
# runs check-agent-context + the tests, or the norms stay written but not biting").
#
# Two scopes, one file:
#   - This kit (supra-repo): runs the smoke against its OWN config + tests the engine
#     once, here at its source.
#   - A consuming fork: calls this as a REUSABLE workflow
#       jobs:
#         agent-context:
#           uses: vibethink-edu/vibethink-dev-kit/.github/workflows/agent-context.yml@master
#           with:
#             config-path: tools/agent-context.config.json   # the fork's config
#     The fork does NOT copy the engine: this workflow fetches the kit's tools and
#     runs the smoke against the fork's checked-out files. The engine is tested only
#     here (forks consume identical code — re-testing it N times is waste).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      golden-agent:
        description: >-
          Agent preset (tools/golden-tasks.config.json) for the LIVE behavioral
          golden-task battery. Live runs spend tokens — this job exists so a human
          fires the battery deliberately after a constitution change
          (REFERENCE-BEHAVIORAL-GOLDEN-TASKS-001 §2).
        type: string
        default: claude
  workflow_call:
    inputs:
      config-path:
        description: Path (in the repo being validated) to the agent-context config.
        type: string
        default: tools/agent-context.config.json
      devkit-ref:
        description: Ref of the dev-kit whose tools a fork should run.
        type: string
        default: master
      parity-config-path:
        description: >-
          Path (in the consuming repo) to the copy-parity config declaring its
          copy-distributed runnables (ADR-20260524 §3.1). Empty = job skipped —
          a consumer with no declared copies opts out explicitly, not silently.
        type: string
        default: ""
    secrets:
      devkit-token:
        description: >-
          A read token for the dev-kit repo, used to fetch its tools when the
          kit is PRIVATE and the consuming repo is a different one (the default
          GITHUB_TOKEN cannot read another private repo → "repository not
          found"). Optional: omit it when the kit is public or when running
          inside the kit itself; then the step falls back to github.token.
        required: false

env:
  KIT_REPO: vibethink-edu/vibethink-dev-kit

jobs:
  smoke:
    name: cross-agent layering smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo under validation
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          # These jobs run `node` only (no install) — they never invoke a package
          # manager. setup-node@v5 otherwise auto-detects a consumer repo's
          # `packageManager` pin (e.g. pnpm) and tries to enable its cache, which
          # fails with "Unable to locate executable file: pnpm" since the runner
          # never installs it. Disable the auto cache: these jobs don't need it.
          package-manager-cache: false

      # A fork has no engine of its own — fetch the kit's tools. The kit's own run
      # uses its local (branch) tools, so a PR is validated by the code it changes.
      - name: Fetch dev-kit tools (forks only)
        if: github.repository != 'vibethink-edu/vibethink-dev-kit'
        uses: actions/checkout@v5
        with:
          repository: vibethink-edu/vibethink-dev-kit
          ref: ${{ inputs.devkit-ref || 'master' }}
          token: ${{ secrets.devkit-token || github.token }}
          path: _devkit

      - name: Resolve tools dir
        id: tools
        shell: bash
        run: |
          if [ "${{ github.repository }}" = "vibethink-edu/vibethink-dev-kit" ]; then
            echo "dir=tools" >> "$GITHUB_OUTPUT"
          else
            echo "dir=_devkit/tools" >> "$GITHUB_OUTPUT"
          fi

      - name: check-agent-context (smoke)
        run: node ${{ steps.tools.outputs.dir }}/check-agent-context.mjs "${{ inputs.config-path || 'tools/agent-context.config.json' }}"

  copy-parity:
    name: copy-parity (drift guard, ADR-20260524 §3.1)
    # Runs only when a CONSUMING repo passes parity-config-path. The kit itself
    # is the upstream — it has no copies to verify, so it never runs this job.
    if: inputs.parity-config-path != '' && github.repository != 'vibethink-edu/vibethink-dev-kit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo under validation
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          # These jobs run `node` only (no install) — they never invoke a package
          # manager. setup-node@v5 otherwise auto-detects a consumer repo's
          # `packageManager` pin (e.g. pnpm) and tries to enable its cache, which
          # fails with "Unable to locate executable file: pnpm" since the runner
          # never installs it. Disable the auto cache: these jobs don't need it.
          package-manager-cache: false

      - name: Fetch dev-kit (upstream source of the copies)
        uses: actions/checkout@v5
        with:
          repository: vibethink-edu/vibethink-dev-kit
          ref: ${{ inputs.devkit-ref || 'master' }}
          token: ${{ secrets.devkit-token || github.token }}
          path: _devkit

      # The engine itself comes from the kit checkout — a consumer's (possibly
      # drifted) local copy must not be the judge of its own parity.
      - name: check-copy-parity
        run: node _devkit/tools/check-copy-parity.mjs "${{ inputs.parity-config-path }}" --upstream-root _devkit

  engine-tests:
    name: engine tests (all tools/*.test.mjs, glob)
    # The engine is tested once, at its source. Forks consume it; they don't re-test it.
    if: github.repository == 'vibethink-edu/vibethink-dev-kit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          # These jobs run `node` only (no install) — they never invoke a package
          # manager. setup-node@v5 otherwise auto-detects a consumer repo's
          # `packageManager` pin (e.g. pnpm) and tries to enable its cache, which
          # fails with "Unable to locate executable file: pnpm" since the runner
          # never installs it. Disable the auto cache: these jobs don't need it.
          package-manager-cache: false

      # ALL co-located engine tests, discovered by glob — list-free by design.
      # A manually-maintained step list silently skips any test it forgets (the
      # 2026-07-01 maturity audit found 7 of 28 test files never ran here).
      # Glob discovery makes "the test exists" and "CI runs it" the same fact.
      - name: all engine tests (tools/*.test.mjs — glob, cannot silently skip)
        run: |
          set -e
          count=0
          for t in tools/*.test.mjs; do
            echo "────────────────────────────── $t"
            node "$t"
            count=$((count+1))
          done
          echo "✓ ran $count test file(s) by glob"

      # Engine self-runs that are gates (not tests) — kept as explicit steps.
      - name: canon cross-reference integrity
        run: node tools/check-canon-links.mjs

      - name: tool versions declared
        run: node tools/check-tool-versions.mjs

      - name: app/package versioning wired
        run: node tools/check-versioning.mjs

      - name: policy manifests faithful to sealed prose
        run: node tools/check-policy-manifests.mjs tools/policy-manifests.config.json

  golden-tasks-live:
    name: behavioral golden tasks (LIVE agent — dispatch only)
    # The live layer of REFERENCE-BEHAVIORAL-GOLDEN-TASKS-001: a real fresh agent
    # driven through the trap battery. It spends tokens, so it NEVER runs on
    # push/PR — a human dispatches it after a constitution change. The free,
    # deterministic layer (golden-tasks.test.mjs with scripted fake agents) already
    # runs on every push via the engine-tests glob above.
    if: github.event_name == 'workflow_dispatch' && github.repository == 'vibethink-edu/vibethink-dev-kit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Guard — only CI-wired presets
        # The RUNNER is preset-agnostic; this JOB wires one preset's CLI+credential
        # (v1: the default). Dispatching an unwired preset must be a loud RED with
        # the local alternative, not a confusing install/runtime failure
        # (review finding P2, PR #216).
        if: inputs.golden-agent != 'claude'
        run: |
          echo "RED — preset '${{ inputs.golden-agent }}' is not wired in this CI job (v1 wires only the default preset)."
          echo "Run it locally instead: npm run golden:tasks -- --agent ${{ inputs.golden-agent }}"
          echo "Or wire its CLI install + credential as additional steps here."
          exit 1

      - name: Require the agent credential
        # A dispatched live run without a credential must be RED, not skipped —
        # the human asked for a behavioral verdict and is not getting one.
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [ "$HAS_KEY" != "true" ]; then
            echo "RED — golden-tasks-live was dispatched but no ANTHROPIC_API_KEY secret is configured for the '${{ inputs.golden-agent }}' preset."
            exit 1
          fi

      - name: Install the agent CLI
        # v1 of this job wires only the default preset's CLI. Other presets in
        # tools/golden-tasks.config.json run locally (npm run golden:tasks --
        # --agent <name>); add their install+credential here when needed.
        run: npm install -g @anthropic-ai/claude-code

      - name: Run the live battery
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node tools/golden-tasks.mjs run --agent "${{ inputs.golden-agent }}"

  catalog-sync:
    name: catalog-sync (Maintenance rule bites)
    # Producer-only: every spine in knowledge/ must have its catalog piece (or a
    # declared exemption with a reason) and a controlled-vocabulary Status line.
    # This is the gate for the failure class the 2026-06-07 reconciliation closed
    # by hand (~14 spines sealed without their catalog section).
    if: github.repository == 'vibethink-edu/vibethink-dev-kit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          # These jobs run `node` only (no install) — they never invoke a package
          # manager. setup-node@v5 otherwise auto-detects a consumer repo's
          # `packageManager` pin (e.g. pnpm) and tries to enable its cache, which
          # fails with "Unable to locate executable file: pnpm" since the runner
          # never installs it. Disable the auto cache: these jobs don't need it.
          package-manager-cache: false

      - name: check-catalog-sync
        run: node tools/check-catalog-sync.mjs tools/catalog-sync.config.json
